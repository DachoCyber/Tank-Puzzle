name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and SFML runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsfml-dev xvfb

      - name: Build and run unit tests
        run: xvfb-run -a make tests
